name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: lks-url-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Fetch ALB DNS from SSM (base-url = "http://<alb-dns>", strip protocol)
          ALB_DNS=$(aws ssm get-parameter \
            --name "/lks-url/base-url" \
            --query "Parameter.Value" \
            --output text | sed 's|^http://||')
          docker build \
            --build-arg API_UPSTREAM=$ALB_DNS \
            --build-arg ANALYTICS_UPSTREAM=$ALB_DNS \
            -t $REGISTRY/$REPOSITORY:latest \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
            ./frontend/
          docker push $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster lks-url-cluster \
            --service lks-url-frontend-svc \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
