server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Stats/analytics requests — must come before /api/ (longer prefix wins)
    # Local dev: analytics:3001 | Production: ALB DNS (ALB routes /api/stats* → analytics-svc)
    location /api/stats {
        proxy_pass          http://ANALYTICS_UPSTREAM_PLACEHOLDER;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # All other API requests → shortener-api
    # Local dev: api:3000 | Production: ALB DNS (ALB routes /api/* → shortener-api)
    location /api/ {
        proxy_pass          http://API_UPSTREAM_PLACEHOLDER;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all non-API routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
