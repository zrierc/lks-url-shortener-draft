version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: lks-url-postgres
    environment:
      POSTGRES_USER: urlshortener
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: urlshortener
    networks:
      - lks-url-network
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urlshortener"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: lks-url-localstack
    environment:
      SERVICES: sqs,dynamodb
      DEFAULT_REGION: us-east-1
    networks:
      - lks-url-network
    ports:
      - "4566:4566"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -s http://localhost:4566/_localstack/health | grep -q ''"sqs": "running"''',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack-init:
    image: amazon/aws-cli:latest
    container_name: lks-url-localstack-init
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - lks-url-network
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/sh -c
    command: |
      "
      aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name lks-url-click-events
      aws --endpoint-url=http://localstack:4566 dynamodb create-table \
        --table-name lks-url-cache-table \
        --attribute-definitions AttributeName=code,AttributeType=S \
        --key-schema AttributeName=code,KeyType=HASH \
        --billing-mode PAY_PER_REQUEST
      "

  api:
    build:
      context: ./app/api
    container_name: lks-url-api
    depends_on:
      postgres:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    networks:
      - lks-url-network
    environment:
      DATABASE_URL: postgresql://urlshortener:localdev@postgres:5432/urlshortener
      SQS_URL: http://localstack:4566/000000000000/lks-url-click-events
      BASE_URL: http://localhost:3000
      PORT: "3000"
      DYNAMODB_TABLE: lks-url-cache-table
      DYNAMODB_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
    ports:
      - "3000:3000"

  analytics:
    build:
      context: ./app/analytics
    container_name: lks-url-analytics
    depends_on:
      postgres:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://urlshortener:localdev@postgres:5432/urlshortener
      SQS_URL: http://localstack:4566/000000000000/lks-url-click-events
      PORT: "3001"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    networks:
      - lks-url-network
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./app/frontend
    container_name: lks-url-frontend
    networks:
      - lks-url-network
    ports:
      - "8080:80"

networks:
  lks-url-network:
